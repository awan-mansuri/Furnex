<!-- Smart Context-Aware Chat Widget - Adapts to each page -->
<style>
    .chat-widget-container {
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 9999;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    
    .chat-button {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: linear-gradient(135deg, #3B5D50 0%, #2D4A3F 100%);
        box-shadow: 0 4px 12px rgba(59, 93, 80, 0.4);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s ease;
        border: none;
        position: relative;
    }
    
    .chat-button:hover {
        transform: scale(1.1);
        box-shadow: 0 6px 20px rgba(59, 93, 80, 0.6);
    }
    
    .chat-button i {
        color: white;
        font-size: 24px;
    }
    
    .chat-badge {
        position: absolute;
        top: -5px;
        right: -5px;
        background: #ef4444;
        color: white;
        border-radius: 50%;
        width: 20px;
        height: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        font-weight: bold;
    }
    
    .chat-window {
        position: fixed;
        bottom: 90px;
        right: 20px;
        width: 380px;
        max-width: calc(100vw - 40px);
        height: 550px;
        max-height: calc(100vh - 120px);
        background: white;
        border-radius: 16px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        display: none;
        flex-direction: column;
        overflow: hidden;
        animation: slideUp 0.3s ease;
    }
    
    @keyframes slideUp {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    
    .chat-window.active {
        display: flex;
    }
    
    .chat-header {
        background: linear-gradient(135deg, #3B5D50 0%, #2D4A3F 100%);
        color: white;
        padding: 16px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
    }
    
    .chat-header-info {
        display: flex;
        align-items: center;
        gap: 12px;
    }
    
    .chat-avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: white;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #3B5D50;
    }
    
    .chat-status {
        display: flex;
        flex-direction: column;
    }
    
    .chat-title {
        font-weight: 600;
        font-size: 16px;
    }
    
    .chat-online {
        font-size: 12px;
        opacity: 0.9;
        display: flex;
        align-items: center;
        gap: 4px;
    }
    
    .online-dot {
        width: 8px;
        height: 8px;
        background: #10b981;
        border-radius: 50%;
        animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
    }
    
    .chat-close {
        background: transparent;
        border: none;
        color: white;
        cursor: pointer;
        font-size: 20px;
        padding: 4px;
        opacity: 0.8;
        transition: opacity 0.2s;
    }
    
    .chat-close:hover {
        opacity: 1;
    }
    
    .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        background: #f9fafb;
        display: flex;
        flex-direction: column;
        gap: 12px;
    }
    
    .chat-message {
        display: flex;
        gap: 8px;
        animation: fadeIn 0.3s ease;
    }
    
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
    
    .chat-message.user {
        flex-direction: row-reverse;
    }
    
    .message-avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        font-size: 14px;
    }
    
    .message-avatar.bot {
        background: #3B5D50;
        color: white;
    }
    
    .message-avatar.user {
        background: #e5e7eb;
        color: #6b7280;
    }
    
    .message-content {
        max-width: 70%;
        padding: 10px 14px;
        border-radius: 12px;
        font-size: 14px;
        line-height: 1.5;
    }
    
    .message-content.bot {
        background: white;
        color: #1f2937;
        border: 1px solid #e5e7eb;
    }
    
    .message-content.user {
        background: #3B5D50;
        color: white;
    }
    
    .quick-replies {
        padding: 12px 20px;
        background: white;
        border-top: 1px solid #e5e7eb;
        display: flex;
        gap: 8px;
        overflow-x: auto;
        flex-wrap: wrap;
    }
    
    .quick-reply {
        background: #f3f4f6;
        border: 1px solid #e5e7eb;
        padding: 8px 14px;
        border-radius: 18px;
        font-size: 12px;
        color: #4b5563;
        cursor: pointer;
        white-space: normal;
        transition: all 0.2s;
        min-width: fit-content;
        text-align: center;
        line-height: 1.3;
    }
    
    .quick-reply:hover {
        background: #3B5D50;
        color: white;
        border-color: #3B5D50;
    }
    
    .chat-input-container {
        padding: 16px 20px;
        background: white;
        border-top: 1px solid #e5e7eb;
        display: flex;
        gap: 8px;
    }
    
    .chat-input {
        flex: 1;
        border: 1px solid #e5e7eb;
        border-radius: 24px;
        padding: 10px 16px;
        font-size: 14px;
        outline: none;
        transition: border-color 0.2s;
    }
    
    .chat-input:focus {
        border-color: #3B5D50;
    }
    
    .chat-send {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: #3B5D50;
        color: white;
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
    }
    
    .chat-send:hover {
        background: #2D4A3F;
        transform: scale(1.05);
    }
    
    .typing-indicator {
        display: flex;
        gap: 4px;
        padding: 10px 14px;
        background: white;
        border-radius: 12px;
        width: fit-content;
        border: 1px solid #e5e7eb;
    }
    
    .typing-dot {
        width: 8px;
        height: 8px;
        background: #9ca3af;
        border-radius: 50%;
        animation: typing 1.4s infinite;
    }
    
    .typing-dot:nth-child(2) {
        animation-delay: 0.2s;
    }
    
    .typing-dot:nth-child(3) {
        animation-delay: 0.4s;
    }
    
    @keyframes typing {
        0%, 60%, 100% { transform: translateY(0); }
        30% { transform: translateY(-10px); }
    }
    
    @media (max-width: 640px) {
        .chat-window {
            bottom: 80px;
            right: 10px;
            width: calc(100vw - 20px);
            height: calc(100vh - 100px);
        }
    }
</style>

<div class="chat-widget-container">
    <button class="chat-button" onclick="toggleSmartChat()" id="chatButton">
        <i class="fas fa-comments"></i>
        <span class="chat-badge" id="chatBadge" style="display: none;">1</span>
    </button>
    
    <div class="chat-window" id="chatWindow">
        <div class="chat-header">
            <div class="chat-header-info">
                <div class="chat-avatar">
                    <i class="fas fa-robot"></i>
                </div>
                <div class="chat-status">
                    <div class="chat-title">Furnex Assistant</div>
                    <div class="chat-online">
                        <span class="online-dot"></span>
                        <span>Ready to help</span>
                    </div>
                </div>
            </div>
            <button class="chat-close" onclick="toggleSmartChat()">
                <i class="fas fa-times"></i>
            </button>
        </div>
        
        <div class="chat-messages" id="chatMessages">
            <!-- Welcome message added dynamically -->
        </div>
        
        <div class="quick-replies" id="quickReplies">
            <!-- Quick replies added dynamically based on page -->
        </div>
        
        <div class="chat-input-container">
            <input 
                type="text" 
                class="chat-input" 
                id="chatInput" 
                placeholder="Type your message..."
                onkeypress="if(event.key==='Enter') sendSmartMessage()"
            >
            <button class="chat-send" onclick="sendSmartMessage()" id="chatSend">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>
</div>

<script>
let smartChatOpen = false;
let currentPage = detectPage();

function detectPage() {
    const path = window.location.pathname;
    if (path === '/' || path === '/home/') return 'home';
    if (path.includes('/about')) return 'about';
    if (path.includes('/service')) return 'services';
    if (path.includes('/blog')) return 'blog';
    if (path.includes('/contact')) return 'contact';
    if (path.includes('/shop') || path.includes('/product')) return 'shop';
    return 'general';
}

function toggleSmartChat() {
    smartChatOpen = !smartChatOpen;
    const window = document.getElementById('chatWindow');
    const badge = document.getElementById('chatBadge');
    
    if (smartChatOpen) {
        window.classList.add('active');
        badge.style.display = 'none';
        if (document.getElementById('chatMessages').children.length === 0) {
            initializeChat();
        }
    } else {
        window.classList.remove('active');
    }
}

function initializeChat() {
    const welcomeMessage = getWelcomeMessage(currentPage);
    addSmartMessage(welcomeMessage, 'bot');
    
    const quickReplies = getQuickReplies(currentPage);
    displayQuickReplies(quickReplies);
}

function getWelcomeMessage(page) {
    const messages = {
        'home': "👋 Welcome to Furnex! I'm here to help you find the perfect furniture for your home. Would you like to:\n\n✨ Browse our collections\n🎨 Get design recommendations\n📏 Learn about our products\n🚚 Check delivery options",
        'about': "👋 Hi! Thanks for learning about Furnex. We're passionate about quality furniture! How can I assist you today? Ask me about our story, values, or quality standards!",
        'services': "👋 Hello! Interested in our services? I can tell you about:\n\n🔧 Assembly services\n🚚 Delivery options\n↩️ Return policy\n🛡️ Warranty coverage",
        'blog': "👋 Welcome to our blog! Looking for furniture tips? I can help you find:\n\n💡 Design inspiration\n🏠 Room styling guides\n📐 Measurement tips\n🎨 Color matching advice",
        'contact': "👋 Hi! Need help reaching us? I can:\n\n📞 Provide contact details\n📧 Help with your inquiry\n⏰ Share business hours\n📍 Give location info",
        'shop': "👋 Hi! Shopping for furniture? I'm here to help! Ask me about:\n\n📏 Product dimensions\n💰 Pricing & offers\n🚚 Delivery time\n↩️ Returns",
        'general': "👋 Hello! Welcome to Furnex. I'm your AI shopping assistant. How can I help you find the perfect furniture today?"
    };
    return messages[page] || messages['general'];
}

function getQuickReplies(page) {
    const replies = {
        'home': [
            {text: '🛋️ Browse Sofas', action: 'browse sofas'},
            {text: '🛏️ Bedroom Furniture', action: 'bedroom furniture'},
            {text: '🎨 Get Recommendations', action: 'recommendations'},
            {text: '💰 Current Offers', action: 'offers'}
        ],
        'about': [
            {text: '📖 Our Story', action: 'story'},
            {text: '✨ Quality Promise', action: 'quality'},
            {text: '🌱 Sustainability', action: 'sustainability'},
            {text: '👥 Meet the Team', action: 'team'}
        ],
        'services': [
            {text: '🔧 Assembly Service', action: 'assembly'},
            {text: '🚚 Delivery Info', action: 'delivery'},
            {text: '↩️ Returns', action: 'returns'},
            {text: '🛡️ Warranty', action: 'warranty'}
        ],
        'blog': [
            {text: '💡 Design Tips', action: 'design tips'},
            {text: '🎨 Color Guide', action: 'colors'},
            {text: '📐 Measure Right', action: 'measuring'},
            {text: '🏠 Room Ideas', action: 'room ideas'}
        ],
        'contact': [
            {text: '📞 Call Us', action: 'phone'},
            {text: '📧 Email', action: 'email'},
            {text: '📍 Location', action: 'location'},
            {text: '⏰ Hours', action: 'hours'}
        ],
        'shop': [
            {text: '📏 Dimensions', action: 'dimensions'},
            {text: '🚚 Delivery', action: 'delivery'},
            {text: '↩️ Returns', action: 'returns'},
            {text: '💳 Payment', action: 'payment'}
        ]
    };
    return replies[page] || replies['shop'];
}

function displayQuickReplies(replies) {
    const container = document.getElementById('quickReplies');
    container.innerHTML = '';
    replies.forEach(reply => {
        const button = document.createElement('button');
        button.className = 'quick-reply';
        button.textContent = reply.text;
        button.onclick = () => sendSmartMessage(reply.text, reply.action);
        container.appendChild(button);
    });
}

function sendSmartMessage(messageText, actionText) {
    const input = document.getElementById('chatInput');
    const message = messageText || input.value.trim();
    
    if (!message) return;
    
    // Show the full text in user message
    addSmartMessage(message, 'user');
    input.value = '';
    
    showSmartTyping();
    
    // Call backend API for consistent FAQ-based responses
    fetch('/api/chatbot-response/', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': getCookie('csrftoken')
        },
        body: JSON.stringify({
            message: message
        })
    })
    .then(response => response.json())
    .then(data => {
        hideSmartTyping();
        if (data.success && data.response) {
            addSmartMessage(data.response, 'bot');
        } else {
            // Fallback if API fails
            addSmartMessage("I'm having trouble connecting. Please try again or contact support.", 'bot');
        }
    })
    .catch(error => {
        console.error('Error:', error);
        hideSmartTyping();
        addSmartMessage("I'm having trouble connecting. Please try again or contact support.", 'bot');
    });
}

// This function is no longer needed - responses come from backend API
// Keeping it as a fallback for reference
function getSmartBotResponse(message, page) {
    return "I'm here to help! You can ask me about products, delivery, returns, payments, and more!";
}

function addSmartMessage(text, type) {
    const messagesContainer = document.getElementById('chatMessages');
    const messageDiv = document.createElement('div');
    messageDiv.className = `chat-message ${type}`;
    
    const avatar = type === 'bot' ? '<i class="fas fa-robot"></i>' : '<i class="fas fa-user"></i>';
    
    messageDiv.innerHTML = `
        <div class="message-avatar ${type}">
            ${avatar}
        </div>
        <div>
            <div class="message-content ${type}">
                ${text.replace(/\n/g, '<br>')}
            </div>
        </div>
    `;
    
    messagesContainer.appendChild(messageDiv);
    messagesContainer.scrollTop = messagesContainer.scrollHeight;
}

function showSmartTyping() {
    const messagesContainer = document.getElementById('chatMessages');
    const typingDiv = document.createElement('div');
    typingDiv.className = 'chat-message bot';
    typingDiv.id = 'typingIndicator';
    typingDiv.innerHTML = `
        <div class="message-avatar bot">
            <i class="fas fa-robot"></i>
        </div>
        <div class="typing-indicator">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
        </div>
    `;
    messagesContainer.appendChild(typingDiv);
    messagesContainer.scrollTop = messagesContainer.scrollHeight;
}

function hideSmartTyping() {
    const typing = document.getElementById('typingIndicator');
    if (typing) typing.remove();
}

function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}

// Show notification badge after delay
setTimeout(() => {
    if (!smartChatOpen) {
        const badge = document.getElementById('chatBadge');
        badge.style.display = 'flex';
    }
}, 5000);
</script>

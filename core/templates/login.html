{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Login or Register - Furnex">
  <meta name="keywords" content="furniture, login, register, account, shop">
  <link rel="shortcut icon" href="{% static 'images/furnex-f-logo.svg' %}">
  <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
  <link href="{% static 'css/style.css' %}" rel="stylesheet">
  <title>Furnex - Login</title>

  <style>
    /* Fonts */
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

    :root {
      --brand-primary: #3b5d50;
      --brand-dark: #2f2f2f;
      --brand-accent: #f9bf29;
      --bg-gradient: linear-gradient(135deg, var(--brand-primary) 0%, var(--brand-dark) 100%);
      --text-muted: #718096;
      --input-bg: #eee;
      --input-text: #333;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

    body {
      min-height: 100vh;
      background: var(--bg-gradient);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow-x: hidden;
    }

    /* Scoped auth container to avoid Bootstrap .container conflicts */
    .auth-container {
      position: relative;
      width: 850px;
      height: 550px;
      background: #fff;
      border-radius: 30px;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.2);
      margin: 20px;
      overflow: hidden;
    }

    .form-box {
      position: absolute;
      right: 0;
      width: 50%;
      height: 100%;
      background: #fff;
      display: flex;
      align-items: center;
      color: #333;
      text-align: center;
      padding: 40px;
      z-index: 1;
      transition: 0.6s ease-in-out 1.2s, visibility 0s 1s;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .auth-container.active .form-box { right: 50%; }

    .form-box.register { visibility: hidden; }
    .auth-container.active .form-box.register { visibility: visible; }

    /* Register-specific layout tweaks for better fit */
    .form-box.register { align-items: flex-start; }
    .form-box.register form { max-width: 520px; margin: 0 auto; width: 100%; }
    .form-box.register h1 { font-size: 32px; margin: 6px 0 8px; }

    form { width: 100%; }

    .form-box h1 { font-size: 36px; margin: 10px 0; color: var(--brand-primary); }

    .input-box { position: relative; margin: 22px 0; }

    /* Two-column layout for larger screens (used in register form) */
    .form-box.register form .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; align-items: start; }
    @media screen and (max-width: 650px) {
      .form-box.register form .grid-2 { grid-template-columns: 1fr; }
    }

    .input-box input {
      width: 100%;
      padding: 13px 50px 13px 20px;
      background: var(--input-bg);
      border-radius: 8px;
      border: none;
      outline: none;
      font-size: 16px;
      color: var(--input-text);
      font-weight: 500;
    }

    .input-box input::placeholder { color: #888; font-weight: 400; }

    .input-box i { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); font-size: 20px; color: #333; }

    .forgot-link { margin: -15px 0 15px; }
    .forgot-link a { font-size: 14.5px; color: var(--brand-primary); text-decoration: none; }

    .btn {
      width: 100%;
      height: 48px;
      background: var(--brand-primary);
      box-shadow: 0 8px 20px rgba(59, 93, 80, 0.35);
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 16px;
      color: #fff;
      font-weight: 600;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 12px 28px rgba(59, 93, 80, 0.45); }

    .form-box p { font-size: 14.5px; margin: 15px 0; color: var(--text-muted); }

    .social-icons { display: flex; justify-content: center; }
    .social-icons a { display: inline-flex; padding: 10px; border: 2px solid #ccc; border-radius: 8px; font-size: 24px; color: #333; text-decoration: none; margin: 0 8px; }

    .toggle-box { position: absolute; width: 100%; height: 100%; }
    .toggle-box::before {
      content: "";
      position: absolute;
      left: -250%;
      width: 300%;
      height: 100%;
      background: var(--brand-primary);
      border-radius: 150px;
      z-index: 2;
      transition: 1.8s ease-in-out;
    }
    .auth-container.active .toggle-box::before { left: 50%; }

    .toggle-panel {
      position: absolute;
      width: 50%;
      height: 100%;
      color: #fff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 2;
      text-align: center;
      padding: 0 20px;
    }

    .toggle-panel h1 { color: #fff; margin-bottom: 10px; }
    .toggle-panel p { color: #f1f5f9; margin-bottom: 20px; }
    .toggle-panel .btn { width: 160px; height: 46px; background: transparent; border: 2px solid #fff; box-shadow: none; }

    .toggle-panel.toggle-left { left: 0; transition-delay: 1.2s; }
    .auth-container.active .toggle-panel.toggle-left { left: -50%; transition-delay: 0.6s; }

    .toggle-panel.toggle-right { right: -50%; transition-delay: 0.6s; }
    .auth-container.active .toggle-panel.toggle-right { right: 0; transition-delay: 1.2s; }

    /* Brand wordmark in toggle panel */
    .toggle-panel .brand-link { display: inline-block; margin-bottom: 10px; text-decoration: none; }
    .toggle-panel .brand-wordmark { font-size: 34px; font-weight: 700; color: #ffffff; letter-spacing: 0.5px; }
    .toggle-panel .brand-wordmark .dot { color: #8fb3a8; }

    /* Responsive */
    @media screen and (max-width: 650px) {
      .auth-container { height: calc(100vh - 40px); width: calc(100% - 40px); }
      .form-box { bottom: 0; width: 100%; height: 70%; right: 0 !important; transition-delay: 0.4s; }
      .auth-container.active .form-box { right: 0; bottom: 30%; }
      .toggle-box::before { left: 0; top: -270%; width: 100%; height: 300%; }
      .auth-container.active .toggle-box::before { left: 0; top: 70%; }
      .toggle-panel { width: 100%; height: 30%; }
      .toggle-panel.toggle-left { top: 0; }
      .auth-container.active .toggle-panel.toggle-left { left: 0; top: -30%; }
      .toggle-panel.toggle-right { right: 0; bottom: -30%; }
      .auth-container.active .toggle-panel.toggle-right { bottom: 0; }
      /* Slightly reduce register heading and spacing on small screens */
      .form-box.register h1 { font-size: 28px; }
      .form-box.register .input-box { margin: 16px 0; }
    }

    @media screen and (max-width: 450px) {
      .form-box { padding: 20px; }
      .toggle-panel h1 { font-size: 30px; }
    }
  </style>
</head>
<body>
  <!-- Auth Card (Login default view) -->
  <div class="auth-container" id="authContainer">
    <!-- Login form -->
    <div class="form-box login">
      <form method="post" action="{% url 'login' %}">
        {% csrf_token %}
        <h1>Login</h1>
        {% if messages %}
          {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">{{ message }}</div>
          {% endfor %}
        {% endif %}
        <div class="input-box">
          <input type="text" name="username" placeholder="Username" required>
          <i class='bx bxs-user'></i>
        </div>
        <div class="input-box">
          <input type="password" name="password" placeholder="Password" required>
          <i class='bx bxs-lock-alt'></i>
        </div>
        <div class="forgot-link">
          <a href="{% url 'password_reset' %}">Forgot password?</a>
        </div>
        <button type="submit" class="btn">Login</button>
      </form>
    </div>

    <!-- Registration form -->
    <div class="form-box register">
      <form method="post" action="{% url 'register' %}">
        {% csrf_token %}
        <h1>Registration</h1>
        <div class="grid-2">
          <div class="input-box">
            <input type="text" name="first_name" placeholder="First Name" required>
            <i class='bx bxs-user'></i>
          </div>
          <div class="input-box">
            <input type="text" name="last_name" placeholder="Last Name" required>
            <i class='bx bxs-user'></i>
          </div>
        </div>
        <div class="input-box">
          <input type="text" name="username" placeholder="Username" required>
          <i class='bx bxs-user'></i>
        </div>
        <div class="input-box">
          <input type="text" name="email" placeholder="Email" required>
          <i class='bx bxs-envelope'></i>
        </div>
        <div class="grid-2">
          <div class="input-box">
            <input type="password" name="password1" placeholder="Password" required>
            <i class='bx bxs-lock-alt'></i>
          </div>
          <div class="input-box">
            <input type="password" name="password2" placeholder="Confirm Password" required>
            <i class='bx bxs-lock-alt'></i>
          </div>
        </div>
        <button type="submit" class="btn">Register</button>
      </form>
    </div>

    <!-- Toggle panels -->
    <div class="toggle-box">
      <div class="toggle-panel toggle-left">
        <a href="{% url 'home' %}" class="brand-link" title="Go to Home">
          <span class="brand-wordmark">Furnex<span class="dot">.</span></span>
        </a>
        <h1>Hello, Welcome!</h1>
        <p>Don't have an account?</p>
        <button type="button" class="btn register-btn">Register</button>
      </div>
      <div class="toggle-panel toggle-right">
        <a href="{% url 'home' %}" class="brand-link" title="Go to Home">
          <span class="brand-wordmark">Furnex<span class="dot">.</span></span>
        </a>
        <h1>Welcome Back!</h1>
        <p>Already have an account?</p>
        <button type="button" class="btn login-btn">Login</button>
      </div>
    </div>
  </div>

  <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
  <script>
    const container = document.getElementById('authContainer');
    const registerBtn = document.querySelector('.register-btn');
    const loginBtn = document.querySelector('.login-btn');
    if (registerBtn) registerBtn.addEventListener('click', () => container.classList.add('active'));
    if (loginBtn) loginBtn.addEventListener('click', () => container.classList.remove('active'));
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Chat - Furnex</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand': '#3B5D50',
                        'brand-dark': '#2D4A3F',
                        'brand-light': '#DCE5E1',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50">
    <div class="container mx-auto px-4 py-8 max-w-4xl">
        <div class="bg-white rounded-2xl shadow-lg overflow-hidden">
            <!-- Header -->
            <div class="bg-gradient-to-r from-brand to-brand-dark text-white p-6">
                <div class="flex items-center justify-between">
                    <div class="flex items-center space-x-3">
                        <div class="bg-white/20 rounded-full p-3">
                            <i class="fas fa-comments text-2xl"></i>
                        </div>
                        <div>
                            <h1 class="text-2xl font-bold">Live Chat Support</h1>
                            <p class="text-sm text-white/80">We're here to help!</p>
                        </div>
                    </div>
                    <a href="{% url 'home' %}" class="bg-white/20 hover:bg-white/30 rounded-lg px-4 py-2 transition">
                        <i class="fas fa-times"></i>
                    </a>
                </div>
            </div>

            <!-- Messages Container -->
            <div id="messagesContainer" class="h-96 overflow-y-auto p-6 space-y-4 bg-gray-50">
                {% for msg in messages %}
                <div class="flex {% if msg.is_bot or msg.is_staff %}justify-start{% else %}justify-end{% endif %}">
                    <div class="max-w-xs lg:max-w-md">
                        <div class="{% if msg.is_bot %}bg-blue-100 text-blue-900{% elif msg.is_staff %}bg-purple-100 text-purple-900{% else %}bg-brand text-white{% endif %} rounded-2xl px-4 py-3 shadow-sm">
                            <div class="flex items-center space-x-2 mb-1">
                                <i class="fas {% if msg.is_bot %}fa-robot{% elif msg.is_staff %}fa-user-tie{% else %}fa-user{% endif %} text-sm"></i>
                                <span class="text-xs font-semibold">
                                    {% if msg.is_bot %}AI Assistant{% elif msg.is_staff %}Support Agent{% else %}You{% endif %}
                                </span>
                            </div>
                            <p class="text-sm">{{ msg.message }}</p>
                            <span class="text-xs opacity-70 mt-1 block">{{ msg.created_at|date:"H:i" }}</span>
                        </div>
                    </div>
                </div>
                {% endfor %}
            </div>

            <!-- Input Area -->
            <div class="p-6 bg-white border-t border-gray-200">
                <div class="flex items-center space-x-3">
                    <input 
                        type="text" 
                        id="messageInput" 
                        class="flex-1 border-2 border-gray-300 rounded-full px-6 py-3 focus:border-brand focus:outline-none transition"
                        placeholder="Type your message..."
                        onkeypress="if(event.key==='Enter') sendMessage()"
                    >
                    <button 
                        onclick="sendMessage()" 
                        class="bg-brand hover:bg-brand-dark text-white rounded-full p-4 transition shadow-lg hover:shadow-xl"
                    >
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
                <p class="text-xs text-gray-500 mt-3 text-center">
                    <i class="fas fa-robot mr-1"></i> AI-powered responses for instant help
                </p>
            </div>

            <!-- Quick Questions -->
            <div class="p-6 bg-gray-50 border-t border-gray-200">
                <p class="text-sm font-semibold text-gray-700 mb-3">Quick Questions:</p>
                <div class="flex flex-wrap gap-2">
                    <button onclick="sendQuickMessage('What are the product dimensions?')" class="bg-white hover:bg-gray-100 border border-gray-300 rounded-full px-4 py-2 text-sm transition">
                        📏 Dimensions
                    </button>
                    <button onclick="sendQuickMessage('How long is delivery?')" class="bg-white hover:bg-gray-100 border border-gray-300 rounded-full px-4 py-2 text-sm transition">
                        🚚 Delivery
                    </button>
                    <button onclick="sendQuickMessage('What is your return policy?')" class="bg-white hover:bg-gray-100 border border-gray-300 rounded-full px-4 py-2 text-sm transition">
                        ↩️ Returns
                    </button>
                    <button onclick="sendQuickMessage('What payment methods do you accept?')" class="bg-white hover:bg-gray-100 border border-gray-300 rounded-full px-4 py-2 text-sm transition">
                        💳 Payment
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message) return;

            // Add user message to UI immediately
            addMessageToUI(message, false);
            input.value = '';

            // Send to server
            fetch('/api/send-message/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken')
                },
                body: JSON.stringify({
                    conversation_id: {{ conversation.id }},
                    message: message
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    // Reload to get bot response
                    setTimeout(() => location.reload(), 500);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                addMessageToUI('Error sending message. Please try again.', true, true);
            });
        }

        function sendQuickMessage(message) {
            document.getElementById('messageInput').value = message;
            sendMessage();
        }

        function addMessageToUI(message, isBot, isError = false) {
            const container = document.getElementById('messagesContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = `flex ${isBot ? 'justify-start' : 'justify-end'}`;
            messageDiv.innerHTML = `
                <div class="max-w-xs lg:max-w-md">
                    <div class="${isBot ? 'bg-blue-100 text-blue-900' : 'bg-brand text-white'} ${isError ? 'bg-red-100 text-red-900' : ''} rounded-2xl px-4 py-3 shadow-sm">
                        <p class="text-sm">${message}</p>
                    </div>
                </div>
            `;
            container.appendChild(messageDiv);
            container.scrollTop = container.scrollHeight;
        }

        // Auto-scroll to bottom
        document.addEventListener('DOMContentLoaded', function() {
            const container = document.getElementById('messagesContainer');
            container.scrollTop = container.scrollHeight;
        });
    </script>
</body>
</html>
